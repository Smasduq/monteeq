version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/static
    env_file:
      - ./backend/.env
    environment:
      - RUST_SERVICE_URL=http://video-service:8081
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/montage
    depends_on:
      - db
      - video-service

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=montage
    ports:
      - "5432:5432"

  video-service:
    build: ./video-service
    ports:
      - "8081:8081"
    volumes:
      - ./backend/static:/app/static # Shared volume for video processing
    environment:
      - RUST_LOG=info

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_static:
  postgres_data:
